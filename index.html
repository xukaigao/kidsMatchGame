<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小朋友连连看 🎮</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <header>
      <h1>连连看 🎮</h1>
      <div id="hud">
        <div class="hud-item">
          <span class="hud-label">🗺 关卡</span>
          <span id="level-num">1</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">🔗 已连</span>
          <span id="pairs-display">0 / 3</span>
        </div>
        <div class="hud-item">
          <span class="hud-label">👆 步数</span>
          <span id="moves-count">0</span>
        </div>
      </div>
    </header>

    <div id="controls">
      <div id="diff-select">
        <button class="diff-btn active" data-diff="easy">🌱 简单 4×4</button>
        <button class="diff-btn"        data-diff="medium">🌿 中等 6×6</button>
        <button class="diff-btn"        data-diff="hard">🌳 困难 8×8</button>
      </div>
      <div id="action-btns">
        <button id="btn-new">🎮 新关卡</button>
        <button id="btn-hint">💡 提示</button>
        <button id="btn-clear">🗑 清除全部</button>
      </div>
    </div>

    <!-- board-container holds the canvas overlay + the grid -->
    <div id="board-container">
      <canvas id="line-canvas"></canvas>
      <div id="board"></div>
    </div>

    <p id="tip">从一个图案拖到相同的图案，画出连线！线只能走空格，不能交叉 😊</p>

    <!-- Win overlay -->
    <div id="win-overlay" class="hidden">
      <div id="win-card">
        <div id="win-emoji">🎉</div>
        <h2>关卡通关！</h2>
        <div id="win-stars"></div>
        <p id="win-level"></p>
        <p id="win-moves"></p>
        <button id="btn-next">下一关 ▶</button>
      </div>
    </div>

    <div id="toast" class="hidden"></div>

  </div>
  <script src="js/game.js"></script>
</body>
</html>
